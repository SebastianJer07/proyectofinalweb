<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - GOB.PE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div id="loginSection" class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4">Acceso Admin</h3>
                    <div class="mb-3">
                        <label>Usuario</label>
                        <input type="text" id="user" class="form-control" value="admin">
                    </div>
                    <div class="mb-3">
                        <label>Contraseña</label>
                        <input type="password" id="pass" class="form-control" value="123456">
                    </div>
                    <button onclick="login()" class="btn btn-danger w-100">Ingresar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="row justify-content-center d-none">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white d-flex justify-content-between">
                    <span>Panel de Gestión de Trámites</span>
                    <button onclick="logout()" class="btn btn-sm btn-outline-light">Cerrar Sesión</button>
                </div>
                <div class="card-body">
                    <form id="formTramite">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Nombre del Trámite</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Entidad</label>
                                <input type="text" id="entidad" class="form-control" placeholder="Ej: RENIEC" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Descripción</label>
                            <textarea id="descripcion" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label>Costo (S/)</label>
                                <input type="number" id="costo" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Modalidad</label>
                                <select id="modalidad" class="form-select">
                                    <option value="Online">Online</option>
                                    <option value="Presencial">Presencial</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Región</label>
                                <input type="text" id="region" class="form-control" value="Lima">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success">Guardar Trámite</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
